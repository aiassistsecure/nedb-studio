# NEDB Studio — minimal reverse proxy for Cloudflare Flexible SSL
# Cloudflare → origin on HTTP port 80. No 443 needed.
#
#   sudo cp nginx.conf /etc/nginx/sites-available/nedb-studio
#   sudo ln -s /etc/nginx/sites-available/nedb-studio /etc/nginx/sites-enabled/nedb-studio
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/nedb-studio.access.log;
    error_log  /var/log/nginx/nedb-studio.error.log warn;

    proxy_headers_hash_max_size    1024;
    proxy_headers_hash_bucket_size 128;

    # Allow large scaffolds + seed payloads (AI generation responses can be several MB)
    client_max_body_size 32m;

    location / {
        proxy_pass         http://127.0.0.1:3129;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header   Connection        "";

        # AI generation calls to AiAssist can take 15-30s for two LLM passes;
        # keep the read timeout generous and disable response buffering so the
        # client gets bytes as soon as Express flushes them.
        proxy_read_timeout    180s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;
        proxy_buffering       off;
    }
}
