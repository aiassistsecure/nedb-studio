# NEDB Studio — nginx reverse proxy
# Cloudflare Flexible SSL: CF terminates HTTPS from the browser,
# talks to this origin on plain HTTP port 80. No 443 here.
#
# Deployment:
#   1. sudo cp nginx.conf /etc/nginx/sites-available/nedb-studio
#   2. sudo ln -s /etc/nginx/sites-available/nedb-studio /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# App:  npm run build && npm run start   (listens on 127.0.0.1:3001)
# Env:  PORT=3001  (default)

upstream nedb_studio {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ── Cloudflare real-IP restoration ──────────────────────────────────────────
# CF forwards the visitor's IP in CF-Connecting-IP. Tell nginx to trust CF's
# IP ranges (https://www.cloudflare.com/ips-v4) so set_real_ip_from works.
# Update these if Cloudflare publishes new ranges.

set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    server_name _;          # replace with your domain, e.g. studio.interchained.org

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/nedb-studio.access.log combined;
    error_log  /var/log/nginx/nedb-studio.error.log warn;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript text/xml application/xml
               application/xml+rss image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Security headers (supplement CF's) ───────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # ── Static assets — long cache (Portal builds with content-hash filenames) ─
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|webp|avif)$ {
        proxy_pass         http://nedb_studio;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        # Cloudflare Flexible: the visitor came in on HTTPS even though
        # we're on port 80 — honour the CF header so the app knows.
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API routes — no caching, generous timeout ─────────────────────────────
    location /api/ {
        proxy_pass         http://nedb_studio;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_read_timeout  120s;   # AiAssist generation can take a moment
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        add_header Cache-Control "no-store";
    }

    # ── Everything else (the SPA) ─────────────────────────────────────────────
    location / {
        proxy_pass         http://nedb_studio;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 10s;

        # Portal SPA — don't cache the HTML shell; assets have content-hash names
        add_header Cache-Control "no-cache";
    }
}
